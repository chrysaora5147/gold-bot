name: Gold Bot Daily Run

on:
  schedule:
    # 🎯 ปรับเป็น 0-4 (อาทิตย์-พฤหัส UTC) = จันทร์-ศุกร์ ไทย
    # 🎯 หลบนาที 00 เป็นนาทีที่ 17 เพื่อหลีกเลี่ยงคิวโหลดสูง รันประมาณ 05:17 น. ไทยพอดิบพอดี
    - cron: '17 22 * * 0-4'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install --upgrade yfinance pandas numpy scikit-learn google-generativeai supabase

      - name: Run Gold Prediction Bot
        env:
          GOOGLE_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python bot.py
