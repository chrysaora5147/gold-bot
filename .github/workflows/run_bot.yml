name: Gold Bot Daily Run

on:
  schedule:
    # 🎯 ปรับเป็น 0-4 (อาทิตย์-พฤหัส UTC) = จันทร์-ศุกร์ ไทย
    # 🎯 หลบนาที 00 เป็นนาทีที่ 17 เพื่อหลีกเลี่ยงคิวโหลดสูง รันประมาณ 05:17 น. ไทยพอดิบพอดี
    - cron: '17 22 * * 0-4'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Log scheduler time
        run: |
          echo "UTC time: $(date -u '+%Y-%m-%d %H:%M:%S')"
          echo "Bangkok time: $(TZ=Asia/Bangkok date '+%Y-%m-%d %H:%M:%S')"

      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade yfinance pandas numpy scikit-learn google-generativeai supabase

      - name: Run Gold Prediction Bot
        env:
          GOOGLE_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          RISK_PROFILE: ${{ vars.RISK_PROFILE || 'balanced' }}
          POSITION_MODE: ${{ vars.POSITION_MODE || 'overlay_80_40' }}
        run: python bot.py
