<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOLD QUANT TERMINAL</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-main: #070A11;
            --bg-card: #0E1420;
            --border-color: #1E293B;
            --text-primary: #F8FAFC;
            --text-secondary: #94A3B8;
            --accent-gold: #E2B842;
            --accent-green: #10B981;
            --accent-green-glow: rgba(16, 185, 129, 0.2);
            --accent-red: #F43F5E;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', 'Sarabun', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-primary);
            line-height: 1.6;
            padding: 3rem 1.5rem;
            display: flex;
            justify-content: center;
        }

        .terminal-container {
            width: 100%;
            max-width: 1100px;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        /* Top Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1.5rem;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 3px;
            color: var(--text-primary);
        }

        h1 span {
            color: var(--accent-gold);
            text-shadow: 0 0 15px rgba(226, 184, 66, 0.2);
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            background: var(--bg-card);
            padding: 0.6rem 1.2rem;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            font-weight: 600;
            letter-spacing: 1px;
        }

        .pulse-dot {
            width: 8px;
            height: 8px;
            background-color: var(--accent-green);
            border-radius: 50%;
            box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7);
            animation: pulse 2s infinite;
        }

        /* Consensus Section (Ultra Premium Layout - No Overlap) */
        .consensus-board {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 3rem 2rem;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .consensus-board::before {
            content: '';
            position: absolute;
            left: 50%;
            top: 20%;
            bottom: 20%;
            width: 1px;
            background-color: var(--border-color);
        }

        .predict-block {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .predict-block h2 {
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-secondary);
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .direction-value {
            font-size: 3rem; 
            font-weight: 700;
            color: var(--accent-green);
            text-shadow: 0 0 30px var(--accent-green-glow);
            line-height: 1.2;
            font-family: 'Sarabun', 'Inter', sans-serif;
            letter-spacing: 1px;
        }

        /* 2-Column Balanced Insights Grid */
        .insights-grid {
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 2rem;
        }

        @media (max-width: 850px) {
            .consensus-board { grid-template-columns: 1fr; gap: 2rem; padding: 2rem 1rem;}
            .consensus-board::before { display: none; }
            .insights-grid { grid-template-columns: 1fr; }
        }

        .card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .card-title {
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-secondary);
            border-bottom: 1px solid #1E293B;
            padding-bottom: 0.85rem;
        }

        /* Column 1: Model Weights */
        .metric-box {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            padding: 0.5rem 0;
        }

        .metric-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            font-weight: 400;
        }

        .metric-value {
            font-size: 2.4rem;
            font-weight: 700;
            color: var(--text-primary);
            line-height: 1.1;
            letter-spacing: -0.5px;
        }

        /* Column 2: AI Macro Review */
        .macro-text {
            font-size: 0.95rem;
            color: #E2E8F0;
            text-align: justify;
            font-family: 'Sarabun', sans-serif;
            line-height: 1.75;
        }

        .macro-text strong {
            color: var(--accent-gold);
            font-weight: 600;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }
    </style>
</head>
<body>

    <div class="terminal-container">
        <header>
            <h1>GOLD <span>QUANT</span> TERMINAL</h1>
            <div class="status-badge">
                <div class="pulse-dot"></div>
                <span id="update-time">CONNECTING SERVER...</span>
            </div>
        </header>

        <section class="consensus-board">
            <div class="predict-block">
                <h2>🤖 Quantitative Model</h2>
                <div class="direction-value" id="model-dir">--</div>
            </div>
            <div class="predict-block">
                <h2>🧠 Generative AI (Gemini)</h2>
                <div class="direction-value" id="ai-dir">--</div>
            </div>
        </section>

        <section class="insights-grid">
            
            <div class="card">
                <div class="card-title">Model Weights</div>
                <div class="metric-box">
                    <span class="metric-label">Probability (Direction Up)</span>
                    <span class="metric-value" id="model-conf">--%</span>
                </div>
                <div class="metric-box" style="border-top: 1px solid var(--border-color); padding-top: 1.5rem;">
                    <span class="metric-label">AI Signal Weight</span>
                    <span class="metric-value" id="ai-conf" style="color: var(--accent-gold);">--%</span>
                </div>
            </div>

            <div class="card">
                <div class="card-title">Macro & AI Analysis Reason</div>
                <div class="macro-text" id="ai-reason">
                    Syncing neural network logs...
                </div>
            </div>

        </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = "https://vsgbfcatnpytrsshdbkr.supabase.co";
        const SUPABASE_KEY = "sb_publishable_KpdMpkgsChvu0pR_Gh1y8Q_0LxccpPq"; 
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function fetchLatestPrediction() {
            try {
                const { data, error } = await _supabase
                    .from('gold_predictions')
                    .select('*')
                    .order('created_at', { ascending: false })
                    .limit(1);

                if (error) throw error;

                if (data && data.length > 0) {
                    const record = data[0];
                    
                    const setDirectionStyle = (elementId, value) => {
                        const el = document.getElementById(elementId);
                        el.innerText = value;
                        if(value.includes("DOWN") || value.includes("ลง")) {
                            el.style.color = "var(--accent-red)";
                            el.style.textShadow = "0 0 30px rgba(244, 63, 94, 0.2)";
                        } else {
                            el.style.color = "var(--accent-green)";
                            el.style.textShadow = "0 0 30px var(--accent-green-glow)";
                        }
                    };

                    setDirectionStyle('model-dir', record.model_direction);
                    setDirectionStyle('ai-dir', record.ai_direction);

                    // 🔥 [จุดที่แก้ไข] ป้องกันการคำนวณทศนิยมหลอนสำหรับระบบ Random Forest 109% ตัวใหม่
                    let rawModelConf = parseFloat(record.model_confidence);
                    // ถ้าค่าที่ส่งมาจาก DB ต่ำกว่า 1 (เช่น 0.5185) ให้คูณ 100 เพื่อแปลงเป็นเปอร์เซ็นต์
                    if (rawModelConf < 1) {
                        rawModelConf = rawModelConf * 100;
                    }
                    document.getElementById('model-conf').innerText = rawModelConf.toFixed(2) + "%";

                    // สำหรับฝั่ง AI Gemini คุมสถาปัตยกรรมเดิมอย่างปลอดภัย
                    let rawAiConf = parseFloat(record.ai_confidence);
                    if (rawAiConf < 1) {
                        rawAiConf = rawAiConf * 100;
                    }
                    document.getElementById('ai-conf').innerText = rawAiConf.toFixed(0) + "%";
                    
                    // แสดงเนื้อหาบทวิเคราะห์ภาษาไทย
                    let formattedReason = record.ai_reason.replace(/\n/g, '<br>');
                    formattedReason = formattedReason.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                    document.getElementById('ai-reason').innerHTML = formattedReason;

                    // อัปเดตเวลาเวอร์ชันอังกฤษหรูๆ
                    const dateObj = new Date(record.created_at);
                    const timeString = dateObj.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
                    const dateString = dateObj.toLocaleDateString('en-US', { day: 'numeric', month: 'short', year: 'numeric' });
                    document.getElementById('update-time').innerText = `UPDATED: ${dateString} ${timeString}`;
                }
            } catch (err) {
                console.error("Error loading terminal data:", err);
                document.getElementById('ai-reason').innerText = "Error loading connection to database.";
            }
        }

        fetchLatestPrediction();
    </script>
</body>
</html>
