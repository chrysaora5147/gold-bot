<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gold Price Prediction - Mini Boss Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: sans-serif; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6">

    <div class="text-center mb-10">
        <h1 class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-amber-400 to-yellow-600 mb-2">
            GOLD PREDICTION ⚔️
        </h1>
        <p class="text-slate-400 text-sm tracking-wider uppercase">The Ultimate Battle: Model vs AI</p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-8 w-full max-w-4xl">
        
        <div class="bg-slate-800/50 backdrop-blur border border-slate-700/50 p-6 rounded-2xl flex flex-col justify-between shadow-xl">
            <div>
                <div class="flex items-center space-x-2 text-sky-400 font-semibold mb-4 text-sm uppercase tracking-wide">
                    <span>🤖</span> <span>Model Prediction</span>
                </div>
                <div class="text-xs text-slate-400 mb-1">ทิศทางที่คาดการณ์สำหรับพรุ่งนี้</div>
                <div id="model-dir" class="text-3xl font-black mb-4 text-slate-500">⏳ กำลังโหลด...</div>
            </div>
            <div class="bg-slate-900/50 p-4 rounded-xl border border-slate-700/30">
                <div class="text-xs text-slate-500 mb-1">ความมั่นใจสถิติ (Confidence)</div>
                <div id="model-conf" class="text-xl font-bold text-sky-400">-</div>
            </div>
        </div>

        <div class="bg-slate-800/50 backdrop-blur border border-slate-700/50 p-6 rounded-2xl flex flex-col justify-between shadow-xl">
            <div>
                <div class="flex items-center space-x-2 text-rose-400 font-semibold mb-4 text-sm uppercase tracking-wide">
                    <span>🧠</span> <span>AI Prediction (Gemini)</span>
                </div>
                <div class="text-xs text-slate-400 mb-1">ทิศทางที่คาดการณ์สำหรับพรุ่งนี้</div>
                <div id="ai-dir" class="text-3xl font-black mb-4 text-slate-500">⏳ กำลังโหลด...</div>
            </div>
            <div class="bg-slate-900/50 p-4 rounded-xl border border-slate-700/30">
                <div class="text-xs text-slate-500 mb-1">บทวิเคราะห์มหาภาค (Macro Review)</div>
                <div id="ai-reason" class="text-xs text-slate-300 leading-relaxed max-h-32 overflow-y-auto">-</div>
            </div>
        </div>

    </div>

    <div class="mt-10 text-xs text-slate-500 flex items-center space-x-2">
        <span class="inline-block w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
        <span id="update-time">Connected to Supabase Table Data</span>
    </div>

    <script>
        const SUPABASE_URL = "https://vsgbfcatnpytrsshdbkr.supabase.co";
        const SUPABASE_KEY = "sb_publishable_KpdMpkgsChvu0pR_Gh1y8Q_0LxccpPq";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function fetchLatestPrediction() {
            // ดึงข้อมูลแถวล่าสุดตัวเดียวจากตารางทองของบอส
            const { data, error } = await _supabase
                .from('gold_predictions')
                .select('*')
                .order('id', { ascending: false })
                .limit(1);

            if (error) {
                console.error("Error fetching data:", error);
                return;
            }

            if (data && data.length > 0) {
                const latest = data[0];
                
                // อัปเดตฝั่ง Model
                const modelDirEl = document.getElementById('model-dir');
                modelDirEl.innerText = latest.model_direction;
                modelDirEl.className = latest.model_direction.includes("ขึ้น") ? "text-3xl font-black mb-4 text-emerald-400" : "text-3xl font-black mb-4 text-rose-500";
                document.getElementById('model-conf').innerText = (latest.model_confidence * 100).toFixed(2) + "%";

                // อัปเดตฝั่ง AI
                const aiDirEl = document.getElementById('ai-dir');
                aiDirEl.innerText = latest.ai_direction;
                aiDirEl.className = latest.ai_direction.includes("ขึ้น") ? "text-3xl font-black mb-4 text-emerald-400" : "text-3xl font-black mb-4 text-rose-500";
                document.getElementById('ai-reason').innerText = latest.ai_reason;
                
                // เวลาอัปเดต
                const date = new Date(latest.created_at).toLocaleString('th-TH');
                document.getElementById('update-time').innerText = `อัปเดตล่าสุดเมื่อ: ${date}`;
            }
        }

        // สั่งให้ดึงข้อมูลทันทีเมื่อเปิดหน้าเว็บ
        fetchLatestPrediction();
    </script>
</body>
</html>
